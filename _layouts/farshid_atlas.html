<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/assets/farshid.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/farshid.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/farshid-macos27.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/farshid-liquid-glass.css' | relative_url }}">

  {% if page.extra_css %}
  <link rel="stylesheet" href="{{ '/assets/css/' | append: page.extra_css | relative_url }}">
  {% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
</head>
<body class="atlas-layout">
  <div class="nav-wrapper">
    <nav class="site-nav liquid-glass" id="site-nav">
      <div class="nav-header">
        <a class="nav-brand liquid-glass-item" href="{{ '/' | relative_url }}">{{ site.author | default: "Home" }}</a>
        <button type="button" class="nav-menu-btn liquid-glass-item" id="nav-menu-btn" aria-expanded="false" aria-controls="nav-list">Menu</button>
      </div>
      <ul class="nav-list" id="nav-list" aria-label="Site navigation">
        {% if site.data.nav and site.data.nav.size > 0 %}
          {% include nav-items.html items=site.data.nav %}
        {% endif %}
      </ul>
    </nav>
  </div>

  <main class="site-main liquid-glass atlas-content">
    {{ content }}
  </main>

  <div class="toolbar liquid-glass bottom-toolbar">
    <button type="button" class="liquid-glass-item" onclick="history.back()">Back</button>
    <a href="{{ '/' | relative_url }}" class="liquid-glass-item">Home</a>
    <a href="{{ '/graph/' | relative_url }}" class="liquid-glass-item">Knowledge Graph</a>
  </div>

{% include footer.html %}
{% include glass-effects.html %}
<script id="nav-data" type="application/json">{{ site.data.nav | jsonify }}</script>

<script src="{{ '/assets/js/farshid-site-nav.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/farshid-link-router.js' | relative_url }}" defer></script>
</body>
</html>
