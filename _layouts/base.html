<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/glass.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
</head>
<body>

<nav class="site-nav liquid-glass" id="site-nav">
  <a class="nav-brand liquid-glass-item" href="{{ '/' | relative_url }}">{{ site.author | default: "Home" }}</a>
  <ul class="nav-list" id="nav-list" aria-label="Site navigation"></ul>
</nav>

<main class="site-main liquid-glass">
  {{ content }}
</main>

{% include footer.html %}

{% include glass-effects.html %}
<script src="{{ '/assets/js/site-nav.js' | relative_url }}" defer></script>
</body>
</html>
