<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    nav {
      background: #222;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
    }

    .site-title {
      color: white;
      font-weight: bold;
      text-decoration: none;
      padding: 0.8rem 1rem 0.8rem 0;
      margin-right: 1rem;
      border-right: 1px solid #555;
    }

    ul#dynamic-nav {
      list-style: none;
      display: flex;
      align-items: center;
    }

    ul#dynamic-nav > li > a {
      display: block;
      color: white;
      padding: 0.8rem 1.2rem;
      text-decoration: none;
      border-right: 1px solid #444;
      cursor: pointer;
    }

    ul#dynamic-nav > li > a:hover { background: #444; }

    li.has-submenu { position: relative; }

    ul.submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #333;
      list-style: none;
      min-width: 160px;
      z-index: 999;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    ul.submenu li a {
      display: block;
      color: white;
      padding: 0.6rem 1.2rem;
      text-decoration: none;
      border-bottom: 1px solid #444;
      white-space: nowrap;
    }

    ul.submenu li a:hover { background: #555; }
    li.has-submenu.open > ul.submenu { display: block; }

    main {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    main h1 { font-size: 1.6rem; margin: 1.5rem 0 0.5rem; }
    main h2 { font-size: 1.3rem; margin: 1.2rem 0 0.4rem; color: #444; }
    main p  { margin: 0.4rem 0; line-height: 1.6; }
    main a  { color: #0066cc; }
  </style>
</head>
<body>

<nav>
  <a class="site-title" href="/">Farshid</a>
  <ul id="dynamic-nav">
    <li><a href="https://github.com/pirahansiah" target="_blank">GitHub</a></li>
  </ul>
</nav>

<main>
  {{ content }}
</main>

<script>
// Build nav on every page
fetch('/contents/site.md')
  .then(r => r.text())
  .then(text => buildMenu(text));

function buildMenu(text) {
  const nav = document.getElementById('dynamic-nav');
  const lines = text.split('\n');

  // First pass: build structured data
  // Each top item: { label, children: [{label, url}] }
  const items = [];
  let current = null;
  let pendingH2 = null;

  lines.forEach(line => {
    const s = line.trim();
    if (!s) return;

    if (s.startsWith('## ')) {
      // flush previous h2 without url
      if (pendingH2 && current) {
        current.children.push({ label: pendingH2, url: null });
      }
      pendingH2 = s.slice(3).trim();

    } else if (s.startsWith('# ')) {
      // flush pending h2
      if (pendingH2 && current) {
        current.children.push({ label: pendingH2, url: null });
        pendingH2 = null;
      }
      // flush previous top item
      current = { label: s.slice(2).trim(), children: [] };
      items.push(current);

    } else if (s.startsWith('[') && s.includes('](') && pendingH2) {
      // this line is a link belonging to pendingH2
      const url = s.split('](')[1].replace(')', '').trim();
      if (current) current.children.push({ label: pendingH2, url: url });
      pendingH2 = null;

    } else if (pendingH2 && current) {
      // non-link line after ##, flush h2 without url
      current.children.push({ label: pendingH2, url: null });
      pendingH2 = null;
    }
  });

  // flush last pending
  if (pendingH2 && current) {
    current.children.push({ label: pendingH2, url: null });
  }

  // Second pass: build DOM — insert before GitHub link
  const githubLi = nav.firstChild;

  items.reverse().forEach(item => {
    const li = document.createElement('li');

    const a = document.createElement('a');
    a.textContent = item.label;
    a.href = '#';
    li.appendChild(a);

    if (item.children.length > 0) {
      li.classList.add('has-submenu');
      const ul = document.createElement('ul');
      ul.className = 'submenu';

      item.children.forEach(child => {
        const childLi = document.createElement('li');
        const childA = document.createElement('a');
        childA.textContent = child.label;
        childA.href = child.url || ('#' + child.label.toLowerCase().replace(/\s+/g,'-'));
        childLi.appendChild(childA);
        ul.appendChild(childLi);
      });

      li.appendChild(ul);
    }

    nav.insertBefore(li, githubLi);
  });
}

// Click to open/close submenus
document.addEventListener('click', function(e) {
  const li = e.target.closest('li.has-submenu');
  if (li) {
    e.preventDefault();
    document.querySelectorAll('li.has-submenu.open').forEach(el => {
      if (el !== li) el.classList.remove('open');
    });
    li.classList.toggle('open');
  } else {
    document.querySelectorAll('li.has-submenu.open').forEach(el => el.classList.remove('open'));
  }
});
</script>

</body>
</html>
