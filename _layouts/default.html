<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    nav {
      background: #222;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    nav .site-title {
      color: white;
      font-weight: bold;
      padding: 0.8rem 0;
      text-decoration: none;
      margin-right: 1rem;
    }

    ul.top-menu {
      list-style: none;
      display: flex;
      gap: 0;
    }

    ul.top-menu > li > a {
      display: block;
      color: white;
      padding: 0.8rem 1.2rem;
      text-decoration: none;
      border-right: 1px solid #444;
    }

    ul.top-menu > li > a:hover { background: #444; }

    li.has-submenu { position: relative; }

    ul.submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #333;
      list-style: none;
      min-width: 160px;
      z-index: 100;
      border-top: 2px solid #888;
    }

    ul.submenu li a {
      display: block;
      color: white;
      padding: 0.6rem 1rem;
      text-decoration: none;
      border-bottom: 1px solid #444;
    }

    ul.submenu li a:hover { background: #555; }

    li.has-submenu.open > ul.submenu { display: block; }

    main { padding: 2rem; }

    pre {
      white-space: pre-wrap;
      font-family: monospace;
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<nav>
  <a class="site-title" href="/">Farshid</a>
  <ul class="top-menu" id="dynamic-nav">
    <!-- filled by JS -->
    <li><a href="https://github.com/pirahansiah" target="_blank">GitHub</a></li>
  </ul>
</nav>

<main>
  {{ content }}
</main>

<script>
  // Click to toggle submenu (not hover)
  document.addEventListener('click', function(e) {
    const li = e.target.closest('li.has-submenu');
    if (li) {
      e.preventDefault();
      // close others
      document.querySelectorAll('li.has-submenu.open').forEach(el => {
        if (el !== li) el.classList.remove('open');
      });
      li.classList.toggle('open');
    } else {
      document.querySelectorAll('li.has-submenu.open').forEach(el => el.classList.remove('open'));
    }
  });
</script>

</body>
</html>
