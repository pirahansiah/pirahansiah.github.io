<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    nav {
      background: #222;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
    }

    .site-title {
      color: white;
      font-weight: bold;
      text-decoration: none;
      padding: 0.8rem 1rem 0.8rem 0;
      margin-right: 1rem;
      border-right: 1px solid #555;
    }

    ul#dynamic-nav {
      list-style: none;
      display: flex;
      align-items: center;
    }

    ul#dynamic-nav > li > a {
      display: block;
      color: white;
      padding: 0.8rem 1.2rem;
      text-decoration: none;
      border-right: 1px solid #444;
      cursor: pointer;
    }

    ul#dynamic-nav > li > a:hover { background: #444; }

    li.has-submenu { position: relative; }

    ul.submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #333;
      list-style: none;
      min-width: 160px;
      z-index: 999;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    ul.submenu li a {
      display: block;
      color: white;
      padding: 0.6rem 1.2rem;
      text-decoration: none;
      border-bottom: 1px solid #444;
      white-space: nowrap;
    }

    ul.submenu li a:hover { background: #555; }

    li.has-submenu.open > ul.submenu { display: block; }

    main {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    main h1 { font-size: 1.6rem; margin: 1.5rem 0 0.5rem; }
    main h2 { font-size: 1.3rem; margin: 1.2rem 0 0.4rem; color: #444; }
    main h3 { font-size: 1.1rem; margin: 1rem 0 0.3rem; color: #666; }
    main p  { margin: 0.4rem 0; line-height: 1.6; }
    main a  { color: #0066cc; }
    main br { display: block; margin: 0.3rem 0; }
  </style>
</head>
<body>

<nav>
  <a class="site-title" href="/">Farshid</a>
  <ul id="dynamic-nav">
    <li><a href="https://github.com/pirahansiah" target="_blank">GitHub</a></li>
  </ul>
</nav>

<main>
  {{ content }}
</main>

<script>
  document.addEventListener('click', function(e) {
    const li = e.target.closest('li.has-submenu');
    if (li) {
      e.preventDefault();
      document.querySelectorAll('li.has-submenu.open').forEach(el => {
        if (el !== li) el.classList.remove('open');
      });
      li.classList.toggle('open');
    } else {
      document.querySelectorAll('li.has-submenu.open').forEach(el => el.classList.remove('open'));
    }
  });
</script>

</body>
</html>
