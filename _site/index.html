<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farshid Pirahansiah</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #222; }

    /* ── NAV ── */
    nav {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .nav-brand {
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      padding: 0.9rem 1.2rem 0.9rem 0;
      margin-right: 0.5rem;
      border-right: 1px solid #444;
      white-space: nowrap;
    }
    .nav-list {
      list-style: none;
      display: flex;
      align-items: stretch;
      height: 100%;
    }
    .nav-list > li {
      position: relative;
      border-right: 1px solid #333;
    }
    .nav-list > li > a {
      display: block;
      color: #ddd;
      text-decoration: none;
      padding: 0.9rem 1.2rem;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .nav-list > li > a:hover { background: #2d2d50; color: #fff; }

    /* dropdown */
    .nav-list > li > ul {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #16213e;
      list-style: none;
      min-width: 170px;
      box-shadow: 0 6px 16px rgba(0,0,0,.5);
      z-index: 2000;
    }
    .nav-list > li > ul > li > a {
      display: block;
      color: #ccc;
      text-decoration: none;
      padding: 0.65rem 1.2rem;
      border-bottom: 1px solid #2d2d50;
      white-space: nowrap;
    }
    .nav-list > li > ul > li > a:hover { background: #0f3460; color: #fff; }
    .nav-list > li.open > ul { display: block; }

    /* ── TOOLBAR (back/forward/home) ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.5rem;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }
    .toolbar button {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 1rem;
    }
    .toolbar button:hover { background: #e8e8e8; }
    .toolbar a {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      text-decoration: none;
      color: #333;
      font-size: 0.85rem;
    }
    .toolbar a:hover { background: #e8e8e8; }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    main h1 { font-size: 1.8rem; margin: 1.5rem 0 0.6rem; }
    main h2 { font-size: 1.3rem; margin: 1.2rem 0 0.4rem; color: #333; }
    main h3 { font-size: 1.1rem; margin: 1rem 0 0.3rem; color: #555; }
    main p  { margin: 0.5rem 0; line-height: 1.7; }
    main a  { color: #0055cc; }
    main a:hover { text-decoration: underline; }
    main pre, main code {
      background: #f4f4f4;
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      font-size: 0.9rem;
    }
    main pre { padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <button onclick="history.back()" title="Back">&#8592;</button>
  <button onclick="history.forward()" title="Forward">&#8594;</button>
  <a href="/">&#8962; Home</a>
</div>

<!-- ── PAGE CONTENT ── -->
<main>
  <div id="site-content"></div>

<script>
fetch('/contents/site.md')
  .then(r => r.text())
  .then(text => {
    let html = '';
    text.split('\n').forEach(line => {
      const s = line.trim();
      if (!s) { html += '<br>'; return; }
      if (s.startsWith('### ')) { html += `<h3>${s.slice(4)}</h3>`; return; }
      if (s.startsWith('## '))  { html += `<h2>${s.slice(3)}</h2>`; return; }
      if (s.startsWith('# '))   { html += `<h1>${s.slice(2)}</h1>`; return; }
      const linkMatch = s.match(/^\[(.+?)\]\((.+?)\)$/);
      if (linkMatch) { html += `<p><a href="${linkMatch[2]}">${linkMatch[1]}</a></p>`; return; }
      html += `<p>${s}</p>`;
    });
    document.getElementById('site-content').innerHTML = html;
  });
</script>


</main>

<script>
  // Click to toggle dropdown, click elsewhere to close
  document.getElementById('nav-list').addEventListener('click', function(e) {
    const li = e.target.closest('li');
    if (!li) return;
    const ul = li.querySelector('ul');
    if (!ul) return; // no dropdown, let link navigate normally
    e.preventDefault();
    const isOpen = li.classList.contains('open');
    document.querySelectorAll('#nav-list li.open').forEach(el => el.classList.remove('open'));
    if (!isOpen) li.classList.add('open');
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('#nav-list')) {
      document.querySelectorAll('#nav-list li.open').forEach(el => el.classList.remove('open'));
    }
  });
</script>

</body>
</html>
