<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Computer Vision & AI Engineer">
  <meta name="author" content="Farshid Pirahansiah">
  <title>Farshid Pirahansiah — Farshid Pirahansiah</title>
  <link rel="stylesheet" href="/assets/css/glass.css">
  <link rel="canonical" href="http://localhost:4000/">
</head>
<body>

<nav class="site-nav liquid-glass" id="site-nav">
  <a class="nav-brand liquid-glass-item" href="/">Farshid Pirahansiah</a>
  <ul class="nav-list" id="nav-list" aria-label="Site navigation"></ul>
</nav>

<div class="toolbar liquid-glass">
  <button type="button" class="liquid-glass-item" onclick="history.back()" title="Back" aria-label="Back">&#8592;</button>
  <button type="button" class="liquid-glass-item" onclick="history.forward()" title="Forward" aria-label="Forward">&#8594;</button>
  <a href="/" class="liquid-glass-item" title="Home">&#8962; Home</a>
</div>

<main class="site-main liquid-glass">
  <div id="site-content"></div>

<script>
(function () {
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  fetch('/contents/site.md')
    .then(function (r) { return r.text(); })
    .then(function (text) {
      var html = '';
      text.split('\n').forEach(function (line) {
        var s = line.trim();
        if (!s) { html += '<br>'; return; }
        if (s.startsWith('### ')) {
          html += '<h3 class="liquid-glass-item">' + escapeHtml(s.slice(4)) + '</h3>';
          return;
        }
        if (s.startsWith('## ')) {
          html += '<h2 class="liquid-glass-item">' + escapeHtml(s.slice(3)) + '</h2>';
          return;
        }
        if (s.startsWith('# ')) {
          html += '<h1 class="liquid-glass-item">' + escapeHtml(s.slice(2)) + '</h1>';
          return;
        }
        var linkMatch = s.match(/^\[(.+?)\]\((.+?)\)$/);
        if (linkMatch) {
          html += '<p><a class="liquid-glass-item" href="' + escapeHtml(linkMatch[2]) + '">' +
            escapeHtml(linkMatch[1]) + '</a></p>';
          return;
        }
        html += '<p class="liquid-glass-item">' + escapeHtml(s) + '</p>';
      });
      document.getElementById('site-content').innerHTML = html;
    })
    .catch(function () {
      document.getElementById('site-content').innerHTML =
        '<p>Could not load <code>contents/site.md</code>.</p>';
    });
})();
</script>


</main>

<footer class="site-footer liquid-glass">
  <p>&copy; 2026 Farshid Pirahansiah. All rights reserved.</p>
  <p>
    <a class="liquid-glass-item" href="https://github.com/pirahansiah" target="_blank" rel="noopener">GitHub</a>
    &middot;
    <a class="liquid-glass-item" href="https://linkedin.com/in/pirahansiah" target="_blank" rel="noopener">LinkedIn</a>
  </p>
</footer>

<svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <filter id="liquid-shimmer" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<script src="/assets/js/site-nav.js" defer></script>
</body>
</html>
